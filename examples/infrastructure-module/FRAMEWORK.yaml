framework:
  name: AI Software Engineering Framework
  version: 1.2.0
  specification_version: 1
  mode: production-ready-by-default
  model_agnostic: true

project:
  name: infrastructure-module
  type: infrastructure
  maturity_target: production
  risk_level: low
  repository_strategy: monorepo
  status: active

authority:
  manifest: FRAMEWORK.yaml
  governance: .ai/governance/DECISION_POLICY.md
  active_context: .ai/context/CURRENT_CONTEXT.md
  architecture: .ai/context/ARCHITECTURE.md
  modules: .ai/context/MODULES.md
  decisions: .ai/decisions/adr

quality_gates:
  formatting: required
  linting: required
  static_analysis: required
  unit_tests: disabled
  integration_tests: required
  e2e_tests: disabled
  contract_tests: disabled
  security_scanning: optional
  dependency_scanning: required
  secret_scanning: required
  build_reproducibility: required
  documentation_validation: required

commands:
  format_check: terraform fmt -check -recursive -diff
  validate: terraform -chdir=envs/dev validate
  plan: terraform -chdir=envs/dev plan -input=false

ai:
  default_autonomy: bounded
  context_policy: minimum-necessary
  require_plan_for_high_risk: true
  require_adr_for_architecture_changes: true
  max_unrelated_files_per_change: 0
  preferred_output: summary-diff-validation
