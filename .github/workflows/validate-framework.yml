name: Validate framework

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:
  workflow_dispatch:

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Quality gates y health score
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Quality gates
        run: node scripts/quality-gates.mjs

      - name: Health score (reporte)
        if: always()
        run: node scripts/health-score.mjs --out health-report.json

      - name: Publicar evidencia de validación
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: health-report
          path: health-report.json
          retention-days: 30
